    <script type="text/javascript" charset="utf-8">
    function check_name() {
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                myFunction(this);
            }
        };
        xhttp.open("GET", "xml/rating.xml", true);
        xhttp.send();

        function myFunction(xml) {
            name = $("#name-check").val();
            var xmlDoc = xml.responseXML;
            var key = xmlDoc.getElementsByTagName("name");
            var query2 = xmlDoc.getElementsByTagName("description");
            var query3 = xmlDoc.getElementsByTagName("rate");
            var query4 = xmlDoc.getElementsByTagName("forme");
            var query5 = xmlDoc.getElementsByTagName("note");
            for (i = 0; i < key.length; i++) {
                if (key[i].childNodes[0].nodeValue == name) {
                    var des = query2[i].childNodes[0].nodeValue;
                    var rate = query3[i].childNodes[0].nodeValue;
                    var forme = query4[i].childNodes[0].nodeValue;
                    var note =  query5[i].childNodes[0].nodeValue;
                }
            }
        $('#result').html("<b>Nhận xét:</b> "+des+"<br/>"+"<b>Đánh giá:</b> "+rate+"/100"+"<br/>"+"<b>Bạn là: </b>"+forme+"<br/>"+"<b>Gửi bạn: </b>"+note); 
        }
    }
    </script>
</head>
