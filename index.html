<!DOCTYPE html>
<html lang="vi">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
<link rel="stylesheet" type="text/css" href="css/home.css">
<link rel="stylesheet" type="text/css" href="fonts/fonts.css">
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quan Bao's Profile</title>
</head>
<script>
    $(document).ready(function(){
  $("a").on('click', function(event) {
    if (this.hash !== "") {
      event.preventDefault();

      var hash = this.hash;

      $('html, body').animate({
        scrollTop: $(hash).offset().top
      }, 800, function(){
        window.location.hash = hash;
      });
    }
  });
});
</script>

<body>
    <div id="header">
        <div id="header-background"></div>
        <div class="blur"></div>
        <p class="h1 text-center">Bao</p>
        <p class="text-center" id="quote">- <i>Nói gì cũng đúng, trừ sự thật</i> -</p>
        <img id="profile-picture" src="pic/profile-picture.jpeg" alt="Ảnh không load được do mạng bạn kém vl (cũng có thể do lỗi ảnh)">
        <p class="h5 text-center" id="bio">Khóc lóc một mình trên internet mỗi ngày</p>
        <hr>
        <div id="more-info" class="text-center">
            <div id="social-media">
                <a href="https://www.facebook.com/xdonk3y">
				<i class="fab fa-facebook"></i>
			</a>
                <a href="https://www.instagram.com/lil.qbao/">
			<i class="fab fa-instagram"></i>
			</a>
                <a href="https://baoo19-7.tumblr.com">
				<i class="fab fa-tumblr-square"></i>
			</a>
                <a href="https://github.com/qxbao">
				<i class="fab fa-github-square"></i>
			</a>
            </div>
            <a href="#get-uid" id="more-info-a">Tìm hiểu thêm</a>
        </div>
    </div>
    <section>
        <div id="get-uid">
            <div class="blur"></div>
            <div class="container">
                <div class="text-center">
                    <p class="h1 text-center title">Tìm UID Facebook</p>
                </div>
                <div class="text-center result">
                    <p class="h3">...</p>
                </div>
                <div class="text-center form">
                    <input id="access-token" class="d-block d-sm-inline-block" type="text" placeholder="access token">
                    <input id="username" class="d-block d-sm-inline-block" type="text" placeholder="username">
                    <button class="d-block" onclick="load_ajax()">XÁC NHẬN</button>
                </div>
            </div>
        </div>
        <script>
        function load_ajax() {
            var username = $('#username').val();
            var access_token = $('#access-token').val();
            $.ajax({
                url: "https://graph.facebook.com/" + username + "?fields=id&access_token="+access_token,
                type: "get",
                dataType: "text",
                data: {

                },
                success: function(result) {
                    var res = result;
                    var uid = res.match(/\d+/gm);
                    $('#get-uid>.container>.result>p').html(uid);
                },
                error: function() {
                    $('#get-uid>.container>.result>p').text("ERROR!");
                }
            });
        }
        </script>
        </div>
    </section>
    </div>
</body>

</html>
